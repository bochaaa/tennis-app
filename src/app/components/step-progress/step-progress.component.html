<div class="rounded-lg bg-white/10 p-3">
  <div class="flex items-center justify-between">
    <p class="text-base font-bold text-white">Paso {{ safeCurrentStep }} de {{ safeTotalSteps }}</p>
    <p class="text-sm font-medium text-white/90" *ngIf="label">{{ label }}</p>
  </div>

  <div class="mt-2 h-2.5 overflow-hidden rounded-full bg-white/30">
    <div
      class="h-full rounded-full bg-white transition-all duration-300"
      [style.width.%]="progressPercent"
    ></div>
  </div>
</div>
