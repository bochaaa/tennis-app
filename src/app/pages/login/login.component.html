<div
  class="min-h-screen bg-[radial-gradient(circle_at_top,_#ef4444_0%,_#b91c1c_45%,_#7f1d1d_100%)] flex items-center justify-center p-4"
>
  <div class="w-full max-w-md rounded-xl border border-white/20 bg-white/95 p-8 shadow-xl">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-red-700 mb-2">CSI Tenis</h1>
      <p class="text-gray-600">Panel de administracion</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
        <input
          type="text"
          formControlName="username"
          class="w-full rounded-lg border border-gray-300 px-4 py-2 outline-none transition focus:border-red-400"
          placeholder="Ingresa tu usuario"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Contrasena</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-gray-300 px-4 py-2 outline-none transition focus:border-red-400"
          placeholder="Ingresa tu contrasena"
        />
      </div>

      <div
        *ngIf="errorMessage"
        class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
      >
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="isLoading || loginForm.invalid"
        class="w-full rounded-lg bg-red-700 py-2 px-4 font-bold text-white transition hover:bg-red-800 disabled:bg-gray-400"
      >
        <span *ngIf="!isLoading">Acceder</span>
        <span *ngIf="isLoading">Cargando...</span>
      </button>
    </form>

    <div class="mt-6 text-center">
      <button
        type="button"
        (click)="goHome()"
        class="text-sm font-medium text-red-700 hover:text-red-800"
      >
        Volver al inicio
      </button>
    </div>
  </div>
</div>
